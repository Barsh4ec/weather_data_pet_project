services:
  db:
    container_name: postgres_container
    image: postgres:14.22
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/airflow_init.sh:/docker-entrypoint-initdb.d/airflow_init.sh
    env_file:
      - .env
    networks:
      - my-network
  
  af:
    container_name: airflow_container
    image: apache/airflow:3.0.0
    ports:
      - 8080:8080
    command: >
      bash -c "airflow db migrate && airflow standalone"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AF_DB_PASSWORD}@${DB_NAME}:5432/airflow_db
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./api-request:/opt/airflow/api-request
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - my-network

networks:
  my-network:
    driver: bridge